server:
    port: 8080
spring:
    application:
        name: backend
    profiles:
        active: @spring.profiles.active@
    datasource:
        url: ${DATABASE_URL:jdbc:mysql://localhost:3306/hotelmanagement?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
        username: ${DATABASE_USERNAME:root}
        password: ${DATABASE_PASSWORD:}
        driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
management:
    endpoints:
        web:
            exposure:
                include: "*"
logging:
    level:
        root: INFO
        web: INFO
jwt:
    secretkey: ${JWT_SECRET_KEY:mySuperSecretKeyForJWTTokenGenerationWhichMustBeLongEnough}
openapi:
  service:
    api-docs: backend
    server: ${BACKEND:http://localhost:${server.port:8080}}
    title: Backend service
    version: 1.0.0